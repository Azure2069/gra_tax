name: bizinvoice_ghana
description: Offline GRA-style invoicing and receivables tracker for small businesses.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.0
  drift: ^2.28.1
  drift_flutter: ^0.2.5
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  intl: ^0.20.2
  url_launcher: ^6.3.2
  pdf: ^3.11.3
  printing: ^5.15.0
  share_plus: ^11.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.1
  build_runner: ^2.7.1

flutter:
  uses-material-design: true
